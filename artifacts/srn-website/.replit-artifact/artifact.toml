kind = "web"
previewPath = "/"
title = "Sashakt Rashtra Nirman"
version = "1.0.0"
id = "artifacts/srn-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24526

[services.development]
run = "pnpm --filter @workspace/srn-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/srn-website", "run", "build" ]
publicDir = "artifacts/srn-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24526"
BASE_PATH = "/"
